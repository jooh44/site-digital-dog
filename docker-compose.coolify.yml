version: '3.8'

services:
  digitaldog-nextjs:
    image: digitaldog-website-nextjs:latest
    container_name: digitaldog-nextjs
    restart: unless-stopped
    networks:
      - coolify
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.digitaldog.rule=Host(`digitaldog.pet`) || Host(`www.digitaldog.pet`)"
      - "traefik.http.routers.digitaldog.entrypoints=websecure"
      - "traefik.http.routers.digitaldog.tls=true"
      - "traefik.http.routers.digitaldog.tls.certresolver=letsencrypt"
      - "traefik.http.services.digitaldog.loadbalancer.server.port=3000"
      - "traefik.http.routers.digitaldog-http.rule=Host(`digitaldog.pet`) || Host(`www.digitaldog.pet`)"
      - "traefik.http.routers.digitaldog-http.entrypoints=web"
      - "traefik.http.routers.digitaldog-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"

networks:
  coolify:
    external: true

