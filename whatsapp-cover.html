<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Dog - WhatsApp Cover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #111111;
      --line-soft: rgba(255, 255, 255, 0.07);
      --line-faint: rgba(255, 255, 255, 0.04);
      --text-strong: rgba(255, 255, 255, 0.92);
      --text-body: rgba(255, 255, 255, 0.34);
      --text-faint: rgba(255, 255, 255, 0.16);
      --cyan: #00bcd4;
      --cyan-soft: #4dd0e1;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #1f1f1f;
      font-family: "Inter", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .page {
      width: min(100%, 1480px);
    }

    .cover {
      position: relative;
      width: 100%;
      aspect-ratio: 1440 / 420;
      overflow: hidden;
      border-radius: 28px;
      background:
        radial-gradient(circle at 72% 28%, rgba(0, 188, 212, 0.10), transparent 26%),
        radial-gradient(circle at 58% 88%, rgba(255, 107, 53, 0.08), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0)),
        var(--bg);
      border: 1px solid rgba(255,255,255,0.03);
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255,255,255,0.02);
    }

    .scanlines {
      position: absolute;
      inset: 0;
      opacity: 0.1;
      background-image: linear-gradient(
        180deg,
        transparent 0,
        transparent 46%,
        rgba(255,255,255,0.7) 46%,
        rgba(255,255,255,0.7) 47%,
        transparent 47%,
        transparent 100%
      );
      background-size: 100% 7px;
      pointer-events: none;
    }

    .grid {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 31% 69%;
    }

    .blank-zone {
      border-right: 1px solid var(--line-faint);
      background: linear-gradient(90deg, rgba(255,255,255,0.01), rgba(255,255,255,0));
    }

    .content {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.78fr);
      gap: 56px;
      padding: 54px 56px 40px 64px;
      align-items: center;
      min-width: 0;
    }

    .copy {
      min-width: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-faint);
      white-space: nowrap;
    }

    .eyebrow::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--cyan);
      box-shadow: 0 0 16px rgba(0, 188, 212, 0.38);
      flex: 0 0 auto;
    }

    .headline {
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      line-height: 0.93;
      letter-spacing: -0.06em;
      font-size: clamp(48px, 5vw, 76px);
      color: var(--text-strong);
    }

    .headline span {
      display: block;
    }

    .headline .cyan {
      color: var(--cyan);
    }

    .subcopy {
      max-width: 380px;
      margin-top: 22px;
      font-size: clamp(16px, 1.4vw, 22px);
      line-height: 1.6;
      color: var(--text-body);
    }

    .stack {
      position: relative;
      min-width: 0;
      padding-left: 32px;
    }

    .stack::before {
      content: "";
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,0.12), transparent);
    }

    .group + .group {
      margin-top: 28px;
    }

    .group-title {
      margin-bottom: 12px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 0 22px;
      border-radius: 18px;
      border: 1px solid var(--line-soft);
      background: rgba(255,255,255,0.04);
      font-size: clamp(18px, 1.3vw, 20px);
      font-weight: 600;
      color: rgba(255,255,255,0.56);
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
    }

    .pill.active {
      color: var(--cyan-soft);
      border-color: rgba(0, 188, 212, 0.25);
      background: rgba(0, 188, 212, 0.10);
    }

    .domain {
      position: absolute;
      right: 52px;
      bottom: 26px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      color: rgba(255,255,255,0.20);
    }

    .domain::after {
      content: "";
      width: 16px;
      height: 16px;
      border-radius: 999px;
      background: var(--cyan);
      box-shadow: 0 0 18px rgba(0, 188, 212, 0.45);
    }

    @media (max-width: 1100px) {
      .content {
        gap: 36px;
        padding: 42px 40px 34px 44px;
        grid-template-columns: minmax(0, 1fr) minmax(240px, 0.74fr);
      }

      .pill {
        min-height: 46px;
        padding-inline: 18px;
        border-radius: 15px;
      }

      .domain {
        right: 34px;
        bottom: 20px;
        font-size: 14px;
      }
    }

    @media (max-width: 860px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .blank-zone {
        display: none;
      }

      .content {
        grid-template-columns: 1fr;
        gap: 28px;
        padding: 36px 28px 72px;
      }

      .stack {
        padding-left: 0;
      }

      .stack::before {
        display: none;
      }

      .subcopy {
        max-width: 100%;
      }

      .domain {
        right: 24px;
        bottom: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="cover">
      <div class="scanlines"></div>

      <div class="grid">
        <div class="blank-zone" aria-hidden="true"></div>

        <div class="content">
          <div class="copy">
            <div class="eyebrow">Designer e desenvolvedor</div>

            <div class="headline">
              <span>Design.</span>
              <span class="cyan">Código.</span>
              <span>Resultado.</span>
            </div>

            <div class="subcopy">
              Ecossistemas digitais completos entregues em 7-14 dias
            </div>
          </div>

          <div class="stack">
            <div class="group">
              <div class="group-title">Plataformas</div>
              <div class="pill-row">
                <span class="pill active">WordPress</span>
                <span class="pill">Next.js</span>
                <span class="pill">PHP</span>
              </div>
            </div>

            <div class="group">
              <div class="group-title">Design &amp; UX</div>
              <div class="pill-row">
                <span class="pill">Figma</span>
                <span class="pill">UI/UX</span>
                <span class="pill active">Logo</span>
              </div>
            </div>

            <div class="group">
              <div class="group-title">Growth &amp; AI</div>
              <div class="pill-row">
                <span class="pill active">AIO/GEO</span>
                <span class="pill">SEO</span>
                <span class="pill">Tracking</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="domain">digitaldog.pet</div>
    </section>
  </main>
</body>
</html>
